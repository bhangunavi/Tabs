<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tabs</title>
  </head>
  <body>
    <div class="tabs">
      <button data-tab="1" class="tab active">First Tab</button>
      <br />
      <button data-tab="2" class="tab">Second Tab</button>
      <br />
      <button data-tab="3" class="tab">Third Tab</button>
      <br />
      <button data-tab="4" class="tab">Fourth Tab</button>
    </div>

    <div class="tab-content">
      <div class="content active" id="tab-1">Content for Tab 1</div>
      <div class="content" id="tab-2">Content for Tab 2</div>
      <div class="content" id="tab-3">Content for Tab 3</div>
      <div class="content" id="tab-4">Content for Tab 4</div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
